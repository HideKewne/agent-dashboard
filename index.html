<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Control Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <!-- Background blobs for glassmorphism -->
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="blob blob-4"></div>
    </div>

    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="logo">
                    <span class="logo-emoji">🐾</span>
                    <h1>Agent Control Center</h1>
                </div>
                <div class="connection-status" id="connectionStatus">
                    <span class="status-dot status-dot-connected"></span>
                    <span class="status-text">Connected</span>
                </div>
            </div>
            <div class="header-right">
                <div class="header-stat">
                    <span class="stat-label">Agents</span>
                    <span class="stat-value" id="agentCount">0</span>
                </div>
                <div class="header-stat">
                    <span class="stat-label">Active</span>
                    <span class="stat-value" id="activeCount">0</span>
                </div>
                <div class="header-stat">
                    <span class="stat-label">Uptime</span>
                    <span class="stat-value" id="uptime">0m</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <!-- Agent Cards Grid -->
            <section class="agents-section">
                <div class="section-header">
                    <h2>Team</h2>
                    <span class="badge badge-gold" id="teamStatus">Operational</span>
                </div>
                <div class="agents-grid" id="agentsGrid">
                    <!-- Agent cards will be injected by JS -->
                </div>
            </section>

            <!-- Activity Feed -->
            <aside class="activity-feed">
                <div class="section-header">
                    <h2>Activity</h2>
                    <button class="btn-icon" id="clearActivity" title="Clear">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                            <path d="M2 4h12M5.333 4V2.667a1.333 1.333 0 011.334-1.334h2.666a1.333 1.333 0 011.334 1.334V4m2 0v9.333a1.333 1.333 0 01-1.334 1.334H4.667a1.333 1.333 0 01-1.334-1.334V4h9.334z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
                <div class="activity-list" id="activityList">
                    <div class="activity-empty">
                        <span>No activity yet</span>
                    </div>
                </div>
            </aside>
        </main>

        <!-- System Status Bar -->
        <footer class="status-bar">
            <div class="status-bar-item">
                <span class="status-bar-label">System</span>
                <span class="status-bar-value status-bar-ok">Healthy</span>
            </div>
            <div class="status-bar-item">
                <span class="status-bar-label">Supabase</span>
                <span class="status-bar-value" id="supabaseStatus">Connecting...</span>
            </div>
            <div class="status-bar-item">
                <span class="status-bar-label">Last Update</span>
                <span class="status-bar-value" id="lastUpdate">--</span>
            </div>
            <div class="status-bar-item">
                <span class="status-bar-label">v1.0</span>
            </div>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
