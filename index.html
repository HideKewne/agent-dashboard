<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent HQ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <!-- Background blobs for glassmorphism -->
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="blob blob-4"></div>
    </div>

    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <span class="brand-emoji">🦎</span>
                <span class="brand-text">Agent HQ</span>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-link active" data-view="dashboard">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-link" data-view="agents">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    <span>Agents</span>
                </a>
                <a href="#" class="nav-link" data-view="activity">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                    <span>Activity</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="connection-indicator" id="connectionStatus">
                    <span class="conn-dot connected"></span>
                    <span class="conn-text">Live</span>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-area">
            <!-- Top Bar -->
            <header class="top-bar">
                <div class="top-bar-left">
                    <h1 class="page-title" id="pageTitle">Dashboard</h1>
                    <span class="page-subtitle" id="pageSubtitle">Real-time agent monitoring</span>
                </div>
                <div class="top-bar-right">
                    <div class="search-box">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" placeholder="Search tasks, agents..." id="searchInput">
                    </div>
                    <div class="sync-info">
                        Last sync: <span id="lastSync">just now</span>
                    </div>
                </div>
            </header>

            <!-- Dashboard View -->
            <div class="view-panel active" id="dashboardView">
                <!-- Agent Status Strip -->
                <div class="agent-strip" id="agentStrip">
                    <!-- Populated by JS -->
                </div>

                <!-- Kanban Board -->
                <div class="kanban-board">
                    <div class="kanban-col" data-status="todo" id="colTodo">
                        <div class="col-header">
                            <div class="col-header-left">
                                <span class="col-icon">📋</span>
                                <h3>To Do</h3>
                            </div>
                            <span class="col-count" data-count="todo">0</span>
                        </div>
                        <div class="col-body" data-drop="todo"></div>
                    </div>
                    <div class="kanban-col col-active" data-status="in_progress" id="colInProgress">
                        <div class="col-header">
                            <div class="col-header-left">
                                <span class="col-icon">⚡</span>
                                <h3>In Progress</h3>
                            </div>
                            <span class="col-count" data-count="in_progress">0</span>
                        </div>
                        <div class="col-body" data-drop="in_progress"></div>
                    </div>
                    <div class="kanban-col col-done" data-status="done" id="colDone">
                        <div class="col-header">
                            <div class="col-header-left">
                                <span class="col-icon">✅</span>
                                <h3>Done</h3>
                            </div>
                            <span class="col-count" data-count="done">0</span>
                        </div>
                        <div class="col-body" data-drop="done"></div>
                    </div>
                    <div class="kanban-col col-archived" data-status="archived" id="colArchived">
                        <div class="col-header">
                            <div class="col-header-left">
                                <span class="col-icon">📦</span>
                                <h3>Archived</h3>
                            </div>
                            <span class="col-count" data-count="archived">0</span>
                        </div>
                        <div class="col-body" data-drop="archived"></div>
                    </div>
                </div>
            </div>

            <!-- Agents View -->
            <div class="view-panel" id="agentsView">
                <div class="agents-full-grid" id="agentsFullGrid">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Activity View -->
            <div class="view-panel" id="activityView">
                <div class="activity-full-list" id="activityFullList">
                    <!-- Populated by JS -->
                </div>
            </div>
        </main>

        <!-- Activity Sidebar -->
        <aside class="activity-rail" id="activityRail">
            <div class="rail-header">
                <h3>Activity</h3>
                <button class="btn-clear" id="clearActivity" title="Clear">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M5.3 4V2.7a1.3 1.3 0 011.4-1.4h2.6a1.3 1.3 0 011.4 1.4V4m2 0v9.3a1.3 1.3 0 01-1.4 1.4H4.7a1.3 1.3 0 01-1.4-1.4V4h9.4z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </div>
            <div class="rail-body" id="activityItems">
                <div class="rail-empty">No activity yet</div>
            </div>
        </aside>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
