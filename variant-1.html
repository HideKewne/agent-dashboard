<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Command Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variant-1.css">
</head>
<body data-variant="1">

    <!-- Background Blobs -->
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="app-layout">

        <!-- LEFT SIDEBAR: Agent Profiles -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                    Agent Profiles
                    <span class="agent-count" id="agent-total">0</span>
                </h2>
            </div>
            <div class="sidebar-agents" id="agents-container">
                <!-- Agent cards rendered by JS -->
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <div class="main-content">

            <!-- Header -->
            <header class="header">
                <div class="header-title">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        <circle cx="12" cy="16" r="1"/>
                    </svg>
                    <h1>Agent Command Center</h1>
                </div>

                <div class="search-box">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="m21 21-4.35-4.35"/>
                    </svg>
                    <input type="text" id="search-input" placeholder="Search tasks...">
                </div>

                <div class="header-actions">
                    <div id="sync-status" title="Realtime: Connecting..."></div>
                    <button class="btn-icon" id="btn-sync" title="Refresh data">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                        </svg>
                    </button>
                    <span class="clock" id="clock">--:--:--</span>
                </div>
            </header>

            <!-- Kanban Board -->
            <div class="kanban-board">

                <!-- To Do Column -->
                <div class="kanban-column">
                    <div class="column-header">
                        <div class="column-icon todo">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>
                        </div>
                        <span class="column-title">To Do</span>
                        <span class="column-count" id="count-todo">0</span>
                    </div>
                    <div class="column-body" id="column-todo" data-status="todo"></div>
                </div>

                <!-- In Progress Column -->
                <div class="kanban-column">
                    <div class="column-header">
                        <div class="column-icon in_progress">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/></svg>
                        </div>
                        <span class="column-title">In Progress</span>
                        <span class="column-count" id="count-in_progress">0</span>
                    </div>
                    <div class="column-body" id="column-in_progress" data-status="in_progress"></div>
                </div>

                <!-- Done Column -->
                <div class="kanban-column">
                    <div class="column-header">
                        <div class="column-icon done">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>
                        </div>
                        <span class="column-title">Done</span>
                        <span class="column-count" id="count-done">0</span>
                    </div>
                    <div class="column-body" id="column-done" data-status="done"></div>
                </div>

                <!-- Archived Column -->
                <div class="kanban-column">
                    <div class="column-header">
                        <div class="column-icon archived">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8v13H3V8M1 3h22v5H1zM10 12h4"/></svg>
                        </div>
                        <span class="column-title">Archived</span>
                        <span class="column-count" id="count-archived">0</span>
                    </div>
                    <div class="column-body" id="column-archived" data-status="archived"></div>
                </div>

            </div>
        </div>
    </div>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Shared JS -->
    <script src="js/main.js"></script>
    <!-- Variant 1 specific JS -->
    <script>
        /* ============================================================
           Variant 1 — Agent Sidebar Rendering + Init
           ============================================================ */

        function renderAgents() {
            const container = document.getElementById('agents-container');
            const countEl = document.getElementById('agent-total');
            if (!container) return;

            container.innerHTML = '';
            countEl.textContent = agents.length;

            if (agents.length === 0) {
                container.innerHTML = `
                    <div style="padding: 20px; text-align: center; color: var(--text-muted); font-size: 13px;">
                        No agents configured yet.
                    </div>
                `;
                return;
            }

            agents.forEach(agent => {
                const initials = agent.name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
                const statusColor = getStatusColor(agent.status);
                const agentTasks = tasks.filter(t => t.agent_id === agent.id);
                const completedTasks = agentTasks.filter(t => t.status === 'done' || t.status === 'archived').length;
                const totalTasks = agentTasks.length;
                const progress = totalTasks > 0 ? Math.round((completedTasks / totalTasks) * 100) : 0;

                const card = document.createElement('div');
                card.className = 'agent-card';
                card.innerHTML = `
                    <div class="agent-card-top">
                        <div class="agent-avatar">
                            <div class="agent-avatar-circle">${initials}</div>
                            <div class="agent-status-dot" style="background: ${statusColor};"></div>
                        </div>
                        <div class="agent-info">
                            <div class="agent-name">${escapeHtml(agent.name)}</div>
                            <div class="agent-role">${escapeHtml(agent.role || 'Agent')}</div>
                        </div>
                    </div>
                    <div class="agent-current-task">
                        <span>Task:</span> ${escapeHtml(agent.current_task || 'No active task')}
                    </div>
                    <div class="agent-progress">
                        <div class="agent-progress-fill" style="width: ${progress}%;"></div>
                    </div>
                    ${agent.status === 'idle' || agent.status === 'offline' ? `
                        <button class="btn-deploy" onclick="deployAgent('${agent.id}')">Deploy</button>
                    ` : `
                        <div style="font-size: 11px; color: var(--text-muted); text-align: center;">
                            ${completedTasks}/${totalTasks} tasks complete
                        </div>
                    `}
                `;
                container.appendChild(card);
            });
        }

        async function deployAgent(agentId) {
            await updateAgentStatus(agentId, 'idle');
            await fetchAgents();
            renderAgents();
        }

        // Refresh button
        document.getElementById('btn-sync').addEventListener('click', async () => {
            const btn = document.getElementById('btn-sync');
            btn.style.transform = 'rotate(360deg)';
            btn.style.transition = 'transform 0.6s ease';
            await fetchAllData();
            renderKanbanColumns(1);
            renderAgents();
            setTimeout(() => {
                btn.style.transform = '';
            }, 600);
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initDashboard(1);
        });
    </script>
</body>
</html>
